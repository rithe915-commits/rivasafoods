<!DOCTYPE html>
<html>
<head>
<title>AI Study Helper</title>

<style>

body{
font-family:Arial;
background:#eef2f7;
text-align:center;
padding:40px;
}

.container{
background:white;
width:700px;
margin:auto;
padding:30px;
border-radius:12px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

h1{
margin-bottom:10px;
}

textarea{
width:100%;
height:120px;
padding:10px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
margin-top:10px;
}

button{
padding:10px 18px;
border:none;
border-radius:8px;
background:#4CAF50;
color:white;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#43a047;
}

.tool-btn{
background:#2196F3;
margin:5px;
}

.tool-btn:hover{
background:#1976D2;
}

#result{
margin-top:20px;
padding:15px;
background:#f5f5f5;
border-radius:8px;
text-align:left;
white-space:pre-wrap;
}

ul{
text-align:left;
}

li{
cursor:pointer;
color:#1565C0;
margin:5px 0;
}

li:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<div class="container">

<h1>📚 AI Study Helper</h1>
<p>Generate notes, MCQs, and exam answers instantly</p>

<div>
<button class="tool-btn" onclick="setMode('notes')">Notes</button>
<button class="tool-btn" onclick="setMode('mcq')">MCQ</button>
<button class="tool-btn" onclick="setMode('answer')">Exam Answer</button>
</div>

<textarea id="question" placeholder="Type your question here"></textarea>

<br>

<button onclick="generateAnswer()">Generate</button>

<div id="result">Result will appear here...</div>

<h3>Example Questions</h3>

<ul>
<li onclick="fill('Explain Bus Topology')">Explain Bus Topology</li>
<li onclick="fill('Explain TCP/IP protocol')">Explain TCP/IP Protocol</li>
<li onclick="fill('Advantages of Microcontroller')">Advantages of Microcontroller</li>
<li onclick="fill('What is Ring Topology')">What is Ring Topology</li>
</ul>

</div>

<script>

let mode = "answer";

function setMode(m){
mode = m;
}

function fill(text){
document.getElementById("question").value = text;
}

async function generateAnswer(){

let question = document.getElementById("question").value;

document.getElementById("result").innerText = "Generating...";

let response = await fetch(
"https://api-inference.huggingface.co/models/google/flan-t5-large",
{
method:"POST",
headers:{
"Authorization":"Bearer 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",
"Content-Type":"application/json"
},
body:JSON.stringify({
inputs: mode + " for exam: " + question
})
}
);

let data = await response.json();

if(data.error){
document.getElementById("result").innerText = "Model loading... please try again.";
return;
}

document.getElementById("result").innerText =
data[0].generated_text;

}

</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>

</body>
</html>
