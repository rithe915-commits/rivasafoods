<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Homework Solver</title>

<style>

body{
background:#0f172a;
font-family:Arial, sans-serif;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:#1e293b;
padding:40px;
border-radius:15px;
width:420px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h1{
margin-bottom:20px;
font-weight:600;
}

textarea{
width:100%;
height:120px;
border-radius:10px;
border:none;
padding:10px;
font-size:15px;
outline:none;
resize:none;
}

button{
margin-top:15px;
padding:12px 25px;
border:none;
border-radius:8px;
background:#38bdf8;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0ea5e9;
}

#result{
margin-top:20px;
background:#0f172a;
padding:15px;
border-radius:10px;
min-height:60px;
}

</style>
</head>

<body>

<div class="container">

<h1>AI Homework Solver</h1>

<textarea id="question" placeholder="Type your homework question..."></textarea>

<button onclick="solve()">Solve</button>

<div id="result">Answer will appear here</div>

</div>

<script>

async function solve(){

let question=document.getElementById("question").value;

document.getElementById("result").innerText="Thinking...";

const response = await fetch(
"https://api-inference.huggingface.co/models/google/flan-t5-large",
{
method:"POST",

headers:{
"Authorization":"Bearer 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",
"Content-Type":"application/json"
},

body:JSON.stringify({
inputs:"Solve this step by step: "+question
})

});

let data = await response.json();

document.getElementById("result").innerText =
data[0].generated_text;

}

</script>

</body>
</html>
