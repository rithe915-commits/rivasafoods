<!DOCTYPE html>
<html>
<head>
<title>Day Predictor AI</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#111;
    color:white;
    text-align:center;
    padding-top:80px;
}

h1{
    font-size:40px;
}

.container{
    margin-top:30px;
}

button{
    padding:12px 20px;
    margin:6px;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

.day-btn{
    background:#2c2c2c;
    color:white;
}

.predict{
    background:#ff4444;
    color:white;
    font-weight:bold;
}

#result{
    margin-top:25px;
    font-size:24px;
}
</style>

</head>

<body>

<h1>Day Predictor AI</h1>

<h3>Select today</h3>

<div class="container">

<button class="day-btn" onclick="setDay(0)">Monday</button>
<button class="day-btn" onclick="setDay(1)">Tuesday</button>
<button class="day-btn" onclick="setDay(2)">Wednesday</button>
<button class="day-btn" onclick="setDay(3)">Thursday</button>
<button class="day-btn" onclick="setDay(4)">Friday</button>
<button class="day-btn" onclick="setDay(5)">Saturday</button>
<button class="day-btn" onclick="setDay(6)">Sunday</button>

<br><br>

<button class="predict" onclick="predict()">PREDICT</button>

</div>

<div id="result"></div>

<script>

let today = null;

function setDay(day){
    today = day;
}

function predict(){

    if(today === null){
        document.getElementById("result").innerText="Select a day first!";
        return;
    }

    const days = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];

    let tomorrow = (today + 1) % 7;

    document.getElementById("result").innerText =
    "Tomorrow will be " + days[tomorrow];

}

</script>

</body>
</html>
