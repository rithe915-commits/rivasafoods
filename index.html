<!DOCTYPE html>
<html>
<head>
<title>AI Study Helper</title>

<style>

body{
font-family: Arial;
background:#f4f6f8;
text-align:center;
padding:40px;
}

h1{
color:#333;
}

textarea{
width:80%;
height:120px;
padding:10px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:12px 25px;
font-size:18px;
background:#4CAF50;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:15px;
}

button:hover{
background:#45a049;
}

#result{
margin-top:25px;
padding:20px;
background:white;
width:80%;
margin-left:auto;
margin-right:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

</style>
</head>

<body>

<h1>📚 AI Study Helper</h1>

<p>Paste your question or notes</p>

<textarea id="question" placeholder="Example: Explain Bus Topology"></textarea>

<br>

<button onclick="generateAnswer()">Generate Answer</button>

<div id="result">AI answer will appear here...</div>

<script>

async function generateAnswer(){

let question = document.getElementById("question").value;

let response = await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer YOUR_API_KEY"
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{
role:"system",
content:"You are a study assistant. Give clear exam style answers with bullet points."
},
{
role:"user",
content:question
}
]
})
});

let data = await response.json();

document.getElementById("result").innerText =
data.choices[0].message.content;

}

</script>

</body>
</html>
